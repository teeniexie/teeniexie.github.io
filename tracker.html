<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitPilot - 你的健身 Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-bg"></div>
  <main class="container">
    <header class="hero card">
      <h1>FitPilot</h1>
      <p>记录身体信息、每日饮食、训练与肌肉刺激，自动生成次日建议。</p>
      <div class="hero-actions">
        <a class="btn" href="./index.html">产品首页</a>
        <span id="todayLabel"></span>
      </div>
    </header>

    <section class="grid-2">
      <article class="card">
        <h2>1. 基础信息</h2>
        <form id="profileForm" class="form-grid">
          <label>姓名<input id="name" type="text" placeholder="例如：Alex" /></label>
          <label>性别
            <select id="gender">
              <option value="male">男</option>
              <option value="female">女</option>
              <option value="other">其他</option>
            </select>
          </label>
          <label>年龄<input id="age" type="number" min="10" max="90" /></label>
          <label>身高(cm)<input id="height" type="number" min="120" max="230" /></label>
          <label>体重(kg)<input id="weight" type="number" min="30" max="250" step="0.1" /></label>
          <label>体脂(%)<input id="bodyFat" type="number" min="2" max="60" step="0.1" /></label>
          <label>目标
            <select id="goal">
              <option value="fat_loss">减脂</option>
              <option value="maintain">维持</option>
              <option value="muscle_gain">增肌</option>
            </select>
          </label>
          <label>活动水平
            <select id="activityLevel">
              <option value="sedentary">久坐</option>
              <option value="light">轻度活动</option>
              <option value="moderate">中等活动</option>
              <option value="high">高活动</option>
              <option value="athlete">运动员级</option>
            </select>
          </label>
          <button type="submit" class="btn primary">保存基础信息</button>
        </form>
      </article>

      <article class="card">
        <h2>2. 今日状态</h2>
        <form id="dailyForm" class="form-grid">
          <label>日期<input id="logDate" type="date" /></label>
          <label>晨起体重(kg)<input id="dailyWeight" type="number" step="0.1" min="30" max="250" /></label>
          <label>睡眠(小时)<input id="sleepHours" type="number" step="0.1" min="0" max="16" /></label>
          <label>步数<input id="steps" type="number" min="0" /></label>
          <label>饮水(ml)<input id="waterMl" type="number" min="0" /></label>
          <label>疲劳感(1-5)<input id="fatigue" type="number" min="1" max="5" /></label>
          <label class="full">备注<textarea id="dailyNote" rows="3" placeholder="今天状态、酸痛部位、压力等"></textarea></label>
          <button type="submit" class="btn primary">保存今日状态</button>
        </form>
      </article>
    </section>

    <section class="grid-2">
      <article class="card">
        <div class="title-row">
          <h2>3. 每日饮食</h2>
          <button id="addMealBtn" class="btn">新增饮食</button>
        </div>

        <form id="mealForm" class="form-grid hidden">
          <label>餐次
            <select id="mealType">
              <option value="breakfast">早餐</option>
              <option value="lunch">午餐</option>
              <option value="dinner">晚餐</option>
              <option value="snack">加餐</option>
            </select>
          </label>
          <label>食物<input id="mealName" type="text" placeholder="鸡胸肉 + 米饭" /></label>
          <label>热量(kcal)<input id="mealCalories" type="number" min="0" /></label>
          <label>蛋白(g)<input id="mealProtein" type="number" min="0" step="0.1" /></label>
          <label>碳水(g)<input id="mealCarbs" type="number" min="0" step="0.1" /></label>
          <label>脂肪(g)<input id="mealFat" type="number" min="0" step="0.1" /></label>
          <button type="submit" class="btn primary">保存饮食</button>
        </form>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>餐次</th>
                <th>食物</th>
                <th>热量</th>
                <th>P/C/F</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="mealTableBody"></tbody>
          </table>
        </div>
      </article>

      <article class="card">
        <div class="title-row">
          <h2>4. 每日训练</h2>
          <button id="addWorkoutBtn" class="btn">新增训练</button>
        </div>

        <form id="workoutForm" class="form-grid hidden">
          <label>类型
            <select id="workoutType">
              <option value="aerobic">有氧</option>
              <option value="strength">无氧</option>
              <option value="mobility">拉伸恢复</option>
            </select>
          </label>
          <label>项目<input id="workoutName" type="text" placeholder="跑步 / 深蹲 / 卧推" /></label>
          <label>时长(分钟)<input id="workoutDuration" type="number" min="1" /></label>
          <label>强度(1-5)<input id="workoutIntensity" type="number" min="1" max="5" /></label>
          <label>消耗(kcal)<input id="workoutCalories" type="number" min="0" /></label>
          <div class="full">
            <p class="muted">训练肌群（可多选）</p>
            <div id="muscleCheckboxes" class="muscle-checkboxes"></div>
          </div>
          <button type="submit" class="btn primary">保存训练</button>
        </form>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>类型</th>
                <th>项目</th>
                <th>时长</th>
                <th>强度</th>
                <th>肌群</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="workoutTableBody"></tbody>
          </table>
        </div>
      </article>
    </section>

    <section class="grid-2">
      <article class="card">
        <h2>5. 今日肌肉刺激图</h2>
        <p class="muted">深色区域表示你今天训练到的肌群。</p>
        <div class="muscle-map-wrap">
          <svg viewBox="0 0 380 220" class="muscle-map" aria-label="muscle map">
            <g>
              <rect id="chest" x="65" y="60" width="70" height="32" rx="8" />
              <rect id="shoulders" x="55" y="44" width="90" height="18" rx="8" />
              <rect id="biceps" x="36" y="76" width="20" height="42" rx="8" />
              <rect id="triceps" x="146" y="76" width="20" height="42" rx="8" />
              <rect id="core" x="78" y="94" width="44" height="46" rx="8" />
              <rect id="quads" x="72" y="146" width="24" height="52" rx="8" />
              <rect id="hamstrings" x="104" y="146" width="24" height="52" rx="8" />
              <rect id="calves" x="88" y="198" width="24" height="20" rx="8" />
            </g>
            <g>
              <rect id="back" x="250" y="60" width="70" height="38" rx="8" />
              <rect id="glutes" x="262" y="104" width="46" height="30" rx="8" />
            </g>
          </svg>
          <div id="muscleLegend" class="legend"></div>
        </div>
      </article>

      <article class="card">
        <div class="title-row">
          <h2>6. 次日建议</h2>
          <button id="generateBtn" class="btn primary">生成明日建议</button>
        </div>
        <div id="recommendation" class="recommendation">
          <p class="muted">保存今日饮食和训练后，点击按钮生成。</p>
        </div>
      </article>
    </section>

    <section class="card">
      <h2>7. 最近记录</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>热量(kcal)</th>
              <th>蛋白(g)</th>
              <th>训练时长(min)</th>
              <th>有氧(min)</th>
              <th>无氧(min)</th>
            </tr>
          </thead>
          <tbody id="historyTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
